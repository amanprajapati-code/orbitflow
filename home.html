<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrbitFlow — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --primary:#B6FF6A; --secondary:#7CFFB2; --accent-2:#4FD1FF;
    --bg:#0B0F0C; --text:#F3F6F3; --text-muted:#93A196;
    --border:rgba(182,255,106,0.13); --radius:22px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; position:relative; overflow-x:hidden;
  }
  h1{font-family:'Playfair Display',serif; font-weight:600; letter-spacing:-0.02em;}
  a{color:inherit; text-decoration:none;}
  body::before{
    content:""; position:fixed; top:-20%; left:50%; transform:translateX(-50%);
    width:900px; height:900px; background:radial-gradient(circle, rgba(182,255,106,0.13) 0%, rgba(182,255,106,0) 60%);
    z-index:0; pointer-events:none; animation:drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift{0%{transform:translate(-50%,0) scale(1);} 100%{transform:translate(-46%,3%) scale(1.08);}}

  header{padding:20px 24px; display:flex; align-items:center; justify-content:space-between; position:relative; z-index:2;}
  .logo{display:flex; align-items:center; gap:10px; font-weight:800; font-size:18px;}
  .user-group{display:flex; align-items:center; gap:12px;}
  .avatar-wrap{position:relative;}
  .avatar-btn{
    width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(182,255,106,0.35);
    background:linear-gradient(135deg,var(--primary),var(--accent-2)); cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#0B0F0C; font-weight:800; font-size:13px;
  }
  .avatar-menu{
    display:none; position:absolute; top:44px; right:0; min-width:200px; z-index:60;
    background:#171E19; border:1px solid var(--border); border-radius:12px; padding:10px;
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
  }
  .avatar-menu.open{display:block;}
  .avatar-email{font-size:12px; color:var(--text-muted); padding:8px 10px; border-bottom:1px solid var(--border); margin-bottom:6px; word-break:break-all;}
  .avatar-menu a{display:block; padding:8px 10px; border-radius:8px; font-size:13.5px;}
  .avatar-menu a:hover{background:rgba(182,255,106,0.08); color:var(--primary);}

  main{flex:1; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; z-index:1;}
  .card{
    max-width:460px; width:100%; text-align:center; padding:48px 36px;
    background:linear-gradient(165deg, rgba(255,255,255,0.055), rgba(255,255,255,0.015));
    border:1px solid rgba(255,255,255,0.07); border-radius:var(--radius);
    backdrop-filter:blur(18px) saturate(150%);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    opacity:0; transform:translateY(20px); animation:cardIn .7s cubic-bezier(.16,.8,.3,1) forwards;
  }
  @keyframes cardIn{to{opacity:1; transform:translateY(0);}}
  .icon-badge{
    width:56px; height:56px; margin:0 auto 20px; border-radius:16px;
    background:linear-gradient(135deg, rgba(182,255,106,0.18), rgba(79,209,255,0.1));
    border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:24px;
  }
  .card h1{font-size:26px; margin-bottom:10px;}
  .card p{color:var(--text-muted); font-size:14.5px; margin-bottom:30px;}
  .btn-primary{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:15px 26px; border-radius:999px; font-weight:600; font-size:15.5px;
    background:linear-gradient(135deg, var(--primary), var(--secondary)); color:#0B0F0C; border:none; cursor:pointer;
    box-shadow:0 8px 24px rgba(182,255,106,0.25); transition:transform .2s ease, box-shadow .2s ease;
  }
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 12px 32px rgba(182,255,106,0.4);}
  .plan-note{margin-top:18px; font-size:12.5px; color:var(--text-muted);}
  .plan-note a{color:var(--primary); font-weight:600;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 30 30" fill="none">
      <defs><linearGradient id="lg1" x1="0" y1="0" x2="30" y2="30"><stop offset="0%" stop-color="#B6FF6A"/><stop offset="100%" stop-color="#4FD1FF"/></linearGradient></defs>
      <circle cx="15" cy="15" r="11" stroke="url(#lg1)" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="52 15"/>
      <circle cx="24" cy="9" r="2.4" fill="#B6FF6A"/>
    </svg>
    OrbitFlow
  </div>
  <div class="user-group">
    <div class="avatar-wrap">
      <button class="avatar-btn" id="avatarBtn" onclick="toggleAvatarMenu(event)"></button>
      <div class="avatar-menu" id="avatarMenu">
        <div class="avatar-email" id="avatarEmail"></div>
        <a href="#" onclick="logout(event)">Log out</a>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="card">
    <div class="icon-badge">🎬</div>
    <h1 id="greeting">Welcome back</h1>
    <p>Your captioning workspace is ready. Upload a video to generate accurate Hindi &amp; Hinglish captions.</p>
    <a href="app.html" class="btn-primary">Open Editor →</a>
    <p class="plan-note">Free plan · 5 min transcription/month · <a href="index.html#pricing">Upgrade</a></p>
  </div>
</main>

<script>
  const SUPABASE_URL = "https://znqujdatizxlcyheuscw.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_xac6DqPJuwkVc6UFTJ30rQ_Z6f1P_kR";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function logout(e) {
    if (e) e.preventDefault();
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }
  function toggleAvatarMenu(e) {
    e.preventDefault();
    document.getElementById('avatarMenu').classList.toggle('open');
  }
  document.addEventListener('click', (e) => {
    const wrap = document.querySelector('.avatar-wrap');
    if (wrap && !wrap.contains(e.target)) document.getElementById('avatarMenu').classList.remove('open');
  });

  (async function gate() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session || !session.user) { window.location.href = 'index.html'; return; }
    const email = session.user.email;
    document.getElementById('avatarBtn').textContent = email.charAt(0).toUpperCase();
    document.getElementById('avatarEmail').textContent = email;
    document.getElementById('greeting').textContent = `Welcome back, ${email.split('@')[0]}`;
  })();
</script>
</body>
</html>
